<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 150" width="540" height="150">
  <!-- GABM.jl wordmark — G/A/B/M in the official Julia colours, ".jl" in black -->
  <text x="270" y="75"
        font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="104" letter-spacing="1"
        text-anchor="middle" dominant-baseline="central">
    <tspan fill="#4063D8">G</tspan><tspan fill="#CB3C33">A</tspan><tspan fill="#389826">B</tspan><tspan fill="#9558B2">M</tspan><tspan fill="#1a1a1a">.jl</tspan>
  </text>
</svg>
